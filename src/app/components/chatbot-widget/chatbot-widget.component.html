@if (open) {
  <div class="chat-panel">
    <div class="chat-header">
      <span>Questions? Ask Jo Jo's</span>
      <button class="close" (click)="open = false" aria-label="Close">×</button>
    </div>
    <div class="chat-messages">
      @if (messages.length === 0) {
        <p class="placeholder">Ask about our services, pricing, policies, or anything else!</p>
      }
      @for (m of messages; track $index) {
        <div class="msg" [class.user]="m.role === 'user'" [class.assistant]="m.role === 'assistant'">
          {{ m.text }}
        </div>
      }
      @if (loading) {
        <div class="msg assistant">...</div>
      }
    </div>
    <form class="chat-input" (ngSubmit)="send()">
      <input [(ngModel)]="input" name="input" placeholder="Type your question..." />
      <button type="submit">Send</button>
    </form>
  </div>
}
<button class="chat-toggle" (click)="open = !open" [attr.aria-label]="open ? 'Close chat' : 'Open chat'">
  {{ open ? '×' : '💬' }}
</button>
